<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: #F5F0FF;
    color: #2D1F4E;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 60px;
  }

  .quiz-wrap {
    width: 100%;
    max-width: 640px;
  }

  .quiz-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .quiz-header .channel {
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #9B89CC;
    margin-bottom: 8px;
  }

  .quiz-header h1 {
    font-size: 26px;
    font-weight: 700;
    color: #5B2D8E;
    margin-bottom: 10px;
  }

  .quiz-header p {
    font-size: 14px;
    font-weight: 300;
    color: #6B5A8A;
    line-height: 1.6;
  }

  /* Progress bar */
  .progress-bar {
    height: 4px;
    background: #E8DEFF;
    border-radius: 4px;
    margin-bottom: 32px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: #5B2D8E;
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Block label */
  .block-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #9B89CC;
    margin-bottom: 8px;
  }

  /* Questions */
  .question {
    display: none;
    animation: fadeIn 0.3s ease;
  }

  .question.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-text {
    font-size: 20px;
    font-weight: 700;
    color: #2D1F4E;
    margin-bottom: 24px;
    line-height: 1.4;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 32px;
  }

  .option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    background: #fff;
    border: 2px solid transparent;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 15px;
    font-weight: 400;
    color: #3D2A60;
    text-align: left;
    box-shadow: 0 1px 6px rgba(91,45,142,0.06);
  }

  .option:hover {
    border-color: #C4ABEE;
    background: #FAF7FF;
  }

  .option.selected {
    border-color: #5B2D8E;
    background: #F0E8FF;
    color: #5B2D8E;
    font-weight: 600;
  }

  .option-dot {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid #C4ABEE;
    transition: all 0.2s;
    position: relative;
  }

  .option.selected .option-dot {
    border-color: #5B2D8E;
    background: #5B2D8E;
  }

  .option.selected .option-dot::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #fff;
  }

  /* Navigation */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .btn {
    padding: 14px 28px;
    border-radius: 10px;
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;

    color: #9B89CC;
    border: 2px solid #E0D4F7;
  }

  .btn-back:hover { background: #F0E8FF; }

  .btn-next {

    color: #fff;

    margin-left: auto;
  }

  .btn-next:hover { background: #4A2475; }

  }

  }

    border-radius: 16px;

  .result-name {

    font-weight: 300;

    padding: 14px 18px;
    font-size: 13px;
    font-weight: 400;
    color: #4A3A6A;
    line-height: 1.6;
    text-align: left;
    margin-bottom: 24px;
  }

  .result-why strong {
    color: #5B2D8E;
    font-weight: 600;
  }

  .result-meta {

    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .result-meta .badge {

    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
  }

  .badge-price {
    background: #5B2D8E;
    color: #fff;
  }

  .badge-free {
    background: #EDE6FF;
    color: #5B2D8E;
  }

  .badge-duration {
    background: #F0EBF9;
    color: #5B2D8E;
  }

  .btn-order {
    display: inline-block;
    padding: 16px 36px;
    background: #5B2D8E;
    color: #fff;
    border-radius: 12px;
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    font-weight: 700;
    text-decoration: none;
    transition: background 0.2s;
  }

  .btn-order:hover { background: #4A2475; }

  .btn-clarify {
    display: inline-block;
    margin-top: 12px;
    padding: 13px 28px;
    background: transparent;
    color: #5B2D8E;
    border: 2px solid #C4ABEE;
    border-radius: 12px;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
  }

  .btn-clarify:hover {
    background: #F0E8FF;
    border-color: #5B2D8E;
  }

  .clarify-hint {

    color: #9B89CC;
    margin-top: 10px;
    font-weight: 400;
  }

  .result-actions {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;

  .btn-retry {

    margin: 20px auto 0;
    background: none;
    border: 2px solid #E0D4F7;
    color: #9B89CC;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 600;

    border-radius: 10px;

    .option { padding: 14px 16px; font-size: 14px; }
    .result-card { padding: 28px 20px; }

const QUESTIONS = [{"block": 1, "block_title": "Контекст", "id": "q1", "text": "Что сейчас происходит в вашей жизни?", "options": [{"key": "q1_a", "text": "Переломный момент — теряю ориентиры"}, {"key": "q1_b", "text": "Сложности в отношениях или с партнёром"}, {"key": "q1_c", "text": "Хожу по кругу — старые сценарии повторяются"}, {"key": "q1_d", "text": "Хочу понять, что меня ждёт впереди"}, {"key": "q1_e", "text": "Особая ситуация — с ребёнком или питомцем"}]}, {"block": 1, "block_title": "Контекст", "id": "q2", "text": "Какая сфера жизни требует внимания прямо сейчас?", "options": [{"key": "q2_a", "text": "Я сам(а) — личность, путь, самореализация"}, {"key": "q2_b", "text": "Любовь, семья или деловое партнёрство"}, {"key": "q2_c", "text": "Прошлое, родовые сценарии, карма"}, {"key": "q2_d", "text": "Будущее — планы, важные решения"}]}, {"block": 1, "block_title": "Контекст", "id": "q3", "text": "Что беспокоит вас прямо сейчас больше всего?", "options": [{"key": "q3_a", "text": "Не понимаю себя, своих реакций и выборов"}, {"key": "q3_b", "text": "Напряжение в отношениях или трудный выбор"}, {"key": "q3_c", "text": "Снова наступаю на те же грабли"}, {"key": "q3_d", "text": "Не знаю, какое решение принять"}]}, {"block": 2, "block_title": "Намерение", "id": "q4", "text": "Зачем вы здесь? Что важнее всего получить?", "options": [{"key": "q4_a", "text": "Понять себя глубже"}, {"key": "q4_b", "text": "Получить прогноз или навигацию на будущее"}, {"key": "q4_c", "text": "Разобраться в конкретной ситуации"}, {"key": "q4_d", "text": "Найти точку опоры и внутренний ресурс"}]}, {"block": 3, "block_title": "Формат", "id": "q5", "text": "Как вам комфортнее работать?", "options": [{"key": "q5_a", "text": "Письменный разбор — читаю в своём темпе"}, {"key": "q5_b", "text": "Живое общение, голос, диалог"}, {"key": "q5_c", "text": "Не важно — главное результат"}]}];

let answers = {};
let current = 0;

function buildQuizHTML() {
  const body = document.getElementById('quiz-body');
  body.innerHTML = QUESTIONS.map((q, i) => `
    <div class="question ${i === 0 ? 'active' : ''}" id="q-${i}">
      <div class="block-label">Блок ${q.block} — ${q.block_title}</div>
      <div class="question-text">${q.text}</div>
      <div class="options">
        ${q.options.map(o => `
          <button class="option" data-key="${o.key}" onclick="selectOption(this, '${q.id}', '${o.key}')">
            <span class="option-dot"></span>
            ${o.text}
          </button>
        `).join('')}
      </div>
      <div class="nav">
        ${i > 0 ? `<button class="btn btn-back" onclick="goBack()">Назад</button>` : '<span></span>'}
        <button class="btn btn-next" id="btn-next-${i}" disabled onclick="goNext()">
          ${i < QUESTIONS.length - 1 ? 'Далее' : 'Узнать результат'}
        </button>
      </div>
    </div>
  `).join('');
  updateProgress();
}

function selectOption(el, questionId, key) {
  // Deselect previous in same question
  el.closest('.options').querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  answers[questionId] = key;
  document.getElementById(`btn-next-${current}`).disabled = false;
}

function updateProgress() {
  const pct = (current / QUESTIONS.length) * 100;
  document.getElementById('progress').style.width = pct + '%';
  // restore previous selection if navigating back
  const q = QUESTIONS[current];
  if (answers[q.id]) {
    const saved = document.querySelector(`[data-key="${answers[q.id]}"]`);
    if (saved) {
      saved.classList.add('selected');
      document.getElementById(`btn-next-${current}`).disabled = false;
    }
  }
}

function goNext() {
  const q = QUESTIONS[current];
  if (!answers[q.id]) return;
  if (current < QUESTIONS.length - 1) {
    document.getElementById(`q-${current}`).classList.remove('active');
    current++;
    document.getElementById(`q-${current}`).classList.add('active');
    updateProgress();
  } else {
    showResult();
  }
}

function goBack() {
  if (current > 0) {
    document.getElementById(`q-${current}`).classList.remove('active');
    current--;
    document.getElementById(`q-${current}`).classList.add('active');
    updateProgress();
  }
}

function computeScores() {
  const scores = {};
  SERVICES.forEach(s => { scores[s.id] = 0; });
  Object.values(answers).forEach(key => {
    const weights = SCORING[key] || {};
    Object.entries(weights).forEach(([id, w]) => {
      if (id in scores) scores[id] = (scores[id] || 0) + w;
    });
  });
  return scores;
}

function showResult() {
  document.getElementById('quiz-body').style.display = 'none';
  document.getElementById('progress').style.width = '100%';

  const scores = computeScores();
  const topId = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  const service = SERVICES.find(s => s.id === topId);
  const reason = REASONS[topId] || '';

  const priceHtml = service.price
    ? `<span class="badge badge-price">${service.price.toLocaleString('ru-RU')} ₽</span>`
    : `<span class="badge badge-free">цена по запросу</span>`;
  const durHtml = service.duration
    ? `<span class="badge badge-duration">${service.duration}</span>`
    : '';

  document.getElementById('result-card').innerHTML = `
    <div class="result-badge">Ваша услуга</div>
    <div class="result-name">${service.name}</div>
    <div class="result-desc">${service.description}</div>
    ${reason ? `<div class="result-why"><strong>Почему именно это:</strong> ${reason}</div>` : ''}
    <div class="result-meta">${priceHtml} ${durHtml}</div>
    <div class="result-actions">
      <a class="btn-order" href="https://t.me/tina_yuma" target="_blank">Записаться в Telegram</a>
      <a class="btn-clarify" href="${`https://t.me/tina_yuma?text=${encodeURIComponent('Хочу уточнить по услуге «' + service.name + '» перед заказом')}`}" target="_blank">Уточнить перед заказом</a>
      <p class="clarify-hint">Напишу, подходит ли вам именно эта услуга — без длинных переписок</p>
    </div>
  `;

  document.getElementById('result').classList.add('active');
}

function restart() {
  answers = {};
  current = 0;
  document.getElementById('result').classList.remove('active');
  document.getElementById('quiz-body').style.display = '';
  buildQuizHTML();
}

buildQuizHTML();
